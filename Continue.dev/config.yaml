name: My Local Config
version: 1.0.0
schema: v1

models:
  - name: Company Azure LLM
    provider: azure
    model: your-model-name
    env:
      apiKey: YOUR_AZURE_API_KEY
    apiBase: https://YOUR-AZURE-ENDPOINT.openai.azure.com/openai/deployments/your-deployment-name
    contextLength: 128000
    roles:
      - chat
      - edit
      - agent

tabAutocompleteModel:
  name: Company Azure LLM Autocomplete
  provider: azure
  model: your-model-name
  env:
    apiKey: YOUR_AZURE_API_KEY
  apiBase: https://YOUR-AZURE-ENDPOINT.openai.azure.com/openai/deployments/your-deployment-name

embeddingsProvider:
  provider: azure
  model: text-embedding-ada-002
  env:
    apiKey: YOUR_AZURE_API_KEY
  apiBase: https://YOUR-AZURE-ENDPOINT.openai.azure.com/openai/deployments/text-embedding-ada-002

contextProviders:
  - name: file
  - name: codebase
    params:
      nRetrieve: 30
      nFinal: 10

docs:
  - title: Project Spec
    startUrl: file:///path/to/your/project/spec.md
