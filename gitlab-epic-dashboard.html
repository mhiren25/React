<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitLab EpicDash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Syne', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .kpi-card { background: linear-gradient(135deg, #111827, #1F2937); border: 1px solid #374151; transition: all 0.2s; }
    .kpi-card:hover { border-color: #FC6D26; transform: translateY(-2px); }
    .filter-item { transition: all 0.15s ease; cursor: pointer; }
    .filter-item:hover { background: rgba(252,109,38,0.08); }
    .filter-item.active { background: rgba(252,109,38,0.2); border-color: #FC6D26; }
    .tab-btn.active { border-bottom: 3px solid #FC6D26; color: #FC6D26; font-weight: 600; }
    details summary { list-style: none; cursor: pointer; }
    .gl-btn { background: linear-gradient(135deg, #FC6D26, #E05C1F); }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

<!-- Input Screen -->
<div id="input-screen" class="min-h-screen flex items-center justify-center p-6">
  <div class="max-w-lg w-full bg-gray-900 border border-gray-800 rounded-3xl p-10">
    <h1 class="text-4xl font-black text-center mb-2">EpicDash</h1>
    <p class="text-gray-400 text-center mb-8">Group Dashboard for Product Managers</p>
    
    <div class="space-y-6">
      <div>
        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">GitLab Group URL</label>
        <input id="group-url" type="text" placeholder="https://gitlab.com/gitlab-org" 
               class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-orange-500">
      </div>
      <div>
        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">Personal Access Token</label>
        <input id="pat" type="password" placeholder="glpat-xxxxxxxxxxxxxxxxxxxx" 
               class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-orange-500">
      </div>
      <button onclick="loadDashboard()" 
              class="gl-btn w-full py-4 rounded-2xl font-bold text-lg">Load Dashboard</button>
    </div>
    <div id="input-error" class="hidden mt-4 text-red-400 text-center"></div>
  </div>
</div>

<!-- Loading -->
<div id="loading-screen" class="hidden min-h-screen flex items-center justify-center">
  <div class="text-center">
    <div class="w-20 h-20 border-8 border-orange-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
    <p class="text-xl font-medium">Loading your group data...</p>
    <p id="loading-text" class="text-gray-400 mt-2">Fetching epics and issues</p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard-screen" class="hidden flex flex-col h-screen">
  <header class="bg-gray-900 border-b border-gray-800 px-8 py-5 flex items-center justify-between">
    <div>
      <span class="font-black text-3xl">Epic<span class="text-orange-500">Dash</span></span>
    </div>
    <div class="flex items-center gap-6">
      <span id="group-name" class="text-gray-300 font-medium"></span>
      <button onclick="editInput()" class="text-sm px-5 py-2 border border-gray-700 rounded-2xl hover:bg-gray-800">Change Group</button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar Filters -->
    <aside class="w-80 bg-gray-900 border-r border-gray-800 overflow-y-auto p-6 space-y-8">
      <input id="search" placeholder="Search issues..." class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-3" onkeyup="applyFilters()">

      <div>
        <p class="text-xs uppercase text-gray-500 mb-3">Status</p>
        <div class="space-y-2">
          <label class="filter-item flex items-center gap-3 px-4 py-3 rounded-2xl border border-transparent"><input type="radio" name="status" value="all" checked onchange="applyFilters()"> All Issues</label>
          <label class="filter-item flex items-center gap-3 px-4 py-3 rounded-2xl border border-transparent"><input type="radio" name="status" value="opened" onchange="applyFilters()"> Open Only</label>
        </div>
      </div>

      <div>
        <p class="text-xs uppercase text-gray-500 mb-3">Labels</p>
        <div id="labels-list" class="space-y-1 max-h-72 overflow-y-auto"></div>
      </div>

      <div>
        <p class="text-xs uppercase text-gray-500 mb-3">Assignees</p>
        <div id="assignees-list" class="space-y-1 max-h-72 overflow-y-auto"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <div id="kpis" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10"></div>

      <div class="flex gap-10 border-b border-gray-800 mb-8">
        <button onclick="switchTab(0)" class="tab-btn active pb-4" id="tab0">Epic Overview</button>
        <button onclick="switchTab(1)" class="tab-btn pb-4" id="tab1">Issues Tree</button>
        <button onclick="switchTab(2)" class="tab-btn pb-4" id="tab2">Assignees</button>
        <button onclick="switchTab(3)" class="tab-btn pb-4" id="tab3">Milestones</button>
      </div>

      <div id="tab-content-0" class="tab-content">
        <div id="epic-overview" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
      </div>
      <div id="tab-content-1" class="tab-content hidden">
        <div id="issues-tree" class="space-y-6"></div>
      </div>
      <div id="tab-content-2" class="tab-content hidden">
        <div id="assignee-detail" class="space-y-8"></div>
      </div>
      <div id="tab-content-3" class="tab-content hidden">
        <div id="milestones-detail" class="space-y-6"></div>
      </div>
    </main>
  </div>
</div>

<script>
// ====================== STATE ======================
let appState = {
  pat: "", host: "", groupPath: "",
  epics: [], allIssues: [], filteredIssues: [],
  activeLabels: new Set(), activeAssignees: new Set()
};

// ====================== ESTIMATE PARSER ======================
function parseEstimate(issue) {
  if (issue.time_stats?.time_estimate) return issue.time_stats.time_estimate;
  const text = (issue.labels || []).join(" ").toLowerCase();
  let hours = 0;
  if (/(\d+)\s*pd/.test(text)) hours = parseInt(text.match(/(\d+)\s*pd/)[1]) * 8;
  else if (/(\d+)\s*pw/.test(text)) hours = parseInt(text.match(/(\d+)\s*pw/)[1]) * 40;
  else if (/(\d+)\s*day/.test(text)) hours = parseInt(text.match(/(\d+)\s*day/)[1]) * 8;
  else if (/(\d+)\s*week/.test(text)) hours = parseInt(text.match(/(\d+)\s*week/)[1]) * 40;
  return hours * 3600;
}

function fmtTime(seconds) {
  if (!seconds) return "—";
  const h = Math.floor(seconds / 3600);
  return h + "h";
}

// ====================== API ======================
async function gitlabFetch(url) {
  const res = await fetch(url, { headers: { "PRIVATE-TOKEN": appState.pat } });
  if (!res.ok) throw new Error(`GitLab API error: ${res.status}`);
  return await res.json();
}

// ====================== LOAD DASHBOARD ======================
async function loadDashboard() {
  const urlStr = document.getElementById("group-url").value.trim();
  appState.pat = document.getElementById("pat").value.trim();

  if (!urlStr || !appState.pat) {
    document.getElementById("input-error").textContent = "Both fields are required";
    document.getElementById("input-error").classList.remove("hidden");
    return;
  }

  try {
    const u = new URL(urlStr);
    appState.host = u.origin;
    appState.groupPath = u.pathname.replace(/^\/groups\//, "").replace(/^\//, "").replace(/\/$/, "");
  } catch (e) {
    alert("Invalid Group URL");
    return;
  }

  document.getElementById("input-screen").classList.add("hidden");
  document.getElementById("loading-screen").classList.remove("hidden");

  try {
    const base = `${appState.host}/api/v4`;
    let epics = await gitlabFetch(`${base}/groups/${encodeURIComponent(appState.groupPath)}/epics?state=opened`);

    const promises = epics.map(async (epic) => {
      const issues = await gitlabFetch(`${base}/groups/${encodeURIComponent(appState.groupPath)}/epics/${epic.iid}/issues`);
      return {
        epic,
        issues: issues.map(i => ({...i, estimateSeconds: parseEstimate(i)}))
      };
    });

    appState.epics = await Promise.all(promises);
    appState.allIssues = appState.epics.flatMap(e => e.issues);
    appState.filteredIssues = [...appState.allIssues];

    document.getElementById("loading-screen").classList.add("hidden");
    document.getElementById("dashboard-screen").classList.remove("hidden");

    document.getElementById("group-name").textContent = appState.groupPath;
    buildFilters();
    refreshDashboard();
  } catch (err) {
    alert("Failed to load data: " + err.message);
    document.getElementById("loading-screen").classList.add("hidden");
    document.getElementById("input-screen").classList.remove("hidden");
  }
}

function refreshDashboard() {
  updateKPIs();
  renderEpicOverview();
  renderIssuesTree();
  renderAssigneeOverview();
  renderMilestones();
}

// ====================== KPIs ======================
function updateKPIs() {
  const issues = appState.filteredIssues;
  const total = issues.length;
  const open = issues.filter(i => i.state === "opened").length;
  const estHours = (issues.reduce((sum, i) => sum + (i.estimateSeconds || 0), 0) / 3600).toFixed(1);

  document.getElementById("kpis").innerHTML = `
    <div class="kpi-card rounded-3xl p-6"><p class="text-xs text-gray-400">Total</p><p class="text-4xl font-bold mono">${total}</p></div>
    <div class="kpi-card rounded-3xl p-6"><p class="text-xs text-green-400">Open</p><p class="text-4xl font-bold mono text-green-400">${open}</p></div>
    <div class="kpi-card rounded-3xl p-6"><p class="text-xs text-blue-400">Estimated</p><p class="text-4xl font-bold mono text-blue-400">${estHours}h</p></div>
  `;
}

// ====================== FILTERS ======================
function buildFilters() {
  // Labels
  const labelMap = new Map();
  appState.allIssues.forEach(i => (i.labels || []).forEach(l => labelMap.set(l.name, l)));
  let html = "";
  labelMap.forEach(l => {
    html += `<div data-label="${l.name}" onclick="toggleLabel(this)" class="filter-item px-4 py-3 rounded-2xl border border-transparent flex items-center gap-3">
      <span class="w-4 h-4 rounded" style="background:${l.color || '#666'}"></span>
      ${l.name}
    </div>`;
  });
  document.getElementById("labels-list").innerHTML = html;

  // Assignees
  const assigneeMap = new Map();
  appState.allIssues.forEach(i => (i.assignees || []).forEach(a => assigneeMap.set(a.id, a)));
  html = "";
  assigneeMap.forEach(a => {
    html += `<div data-assignee="${a.id}" onclick="toggleAssignee(this)" class="filter-item px-4 py-3 rounded-2xl border border-transparent flex items-center gap-3">
      ${a.avatar_url ? `<img src="${a.avatar_url}" class="w-6 h-6 rounded-full">` : ''}
      ${a.name || a.username}
    </div>`;
  });
  document.getElementById("assignees-list").innerHTML = html;
}

function toggleLabel(el) {
  const name = el.dataset.label;
  if (appState.activeLabels.has(name)) appState.activeLabels.delete(name);
  else appState.activeLabels.add(name);
  el.classList.toggle("active");
  applyFilters();
}

function toggleAssignee(el) {
  const id = parseInt(el.dataset.assignee);
  if (appState.activeAssignees.has(id)) appState.activeAssignees.delete(id);
  else appState.activeAssignees.add(id);
  el.classList.toggle("active");
  applyFilters();
}

function applyFilters() {
  const term = document.getElementById("search").value.toLowerCase().trim();

  appState.filteredIssues = appState.allIssues.filter(issue => {
    if (term && !issue.title.toLowerCase().includes(term)) return false;

    if (appState.activeLabels.size > 0) {
      const labels = new Set((issue.labels || []).map(l => l.name));
      if (!Array.from(appState.activeLabels).every(l => labels.has(l))) return false;
    }

    if (appState.activeAssignees.size > 0) {
      const assignees = new Set((issue.assignees || []).map(a => a.id));
      if (!Array.from(appState.activeAssignees).some(id => assignees.has(id))) return false;
    }

    return true;
  });

  refreshDashboard();
}

// ====================== RENDER FUNCTIONS ======================
function renderEpicOverview() {
  let html = "";
  appState.epics.forEach(({epic, issues}) => {
    const filteredIssues = issues.filter(i => appState.filteredIssues.some(f => f.id === i.id));
    const est = filteredIssues.reduce((s, i) => s + (i.estimateSeconds || 0), 0);
    html += `
      <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6">
        <a href="${epic.web_url}" target="_blank" class="font-bold text-lg hover:text-orange-400 block">${epic.title}</a>
        <p class="text-xs text-gray-500">#${epic.iid} • ${filteredIssues.length} issues</p>
        <div class="mt-6 text-blue-400 font-medium">${(est/3600).toFixed(1)}h estimated</div>
      </div>`;
  });
  document.getElementById("epic-overview").innerHTML = html || "<p class='text-gray-400 p-8'>No open epics found</p>";
}

function renderIssuesTree() {
  let html = "";
  appState.epics.forEach(({epic, issues}) => {
    const filtered = issues.filter(i => appState.filteredIssues.some(f => f.id === i.id));
    if (filtered.length === 0) return;

    html += `<div class="bg-gray-900 border border-gray-800 rounded-3xl overflow-hidden">
      <details open>
        <summary class="px-6 py-5 bg-gray-800 font-semibold cursor-pointer">#${epic.iid} ${epic.title} <span class="text-xs bg-gray-700 px-3 py-1 rounded-full ml-3">${filtered.length}</span></summary>
        <div class="divide-y divide-gray-800">`;
    
    filtered.forEach(issue => {
      html += `
        <a href="${issue.web_url}" target="_blank" class="block px-6 py-4 hover:bg-gray-800 flex justify-between items-center">
          <span>#${issue.iid} ${issue.title}</span>
          <span class="text-blue-400 text-sm">${fmtTime(issue.estimateSeconds)}</span>
        </a>`;
    });

    html += `</div></details></div>`;
  });
  document.getElementById("issues-tree").innerHTML = html || "<p class='text-gray-400 p-12 text-center'>No matching issues</p>";
}

function renderAssigneeOverview() {
  const map = new Map();
  appState.filteredIssues.forEach(issue => {
    (issue.assignees || []).forEach(a => {
      if (!map.has(a.id)) map.set(a.id, {user: a, issues: []});
      map.get(a.id).issues.push(issue);
    });
  });

  let html = "";
  map.forEach(({user, issues}) => {
    html += `
      <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6">
        <div class="flex items-center gap-4 mb-5">
          ${user.avatar_url ? `<img src="${user.avatar_url}" class="w-10 h-10 rounded-full">` : ''}
          <div class="font-medium">${user.name || user.username}</div>
        </div>
        <div class="space-y-3">`;
    issues.forEach(i => {
      html += `<a href="${i.web_url}" target="_blank" class="block text-sm hover:text-orange-400">#${i.iid} ${i.title}</a>`;
    });
    html += `</div></div>`;
  });
  document.getElementById("assignee-detail").innerHTML = html || "<p class='text-gray-400 p-8'>No assignees in filtered results</p>";
}

function renderMilestones() {
  document.getElementById("milestones-detail").innerHTML = `
    <div class="bg-gray-900 border border-gray-800 rounded-3xl p-12 text-center text-gray-400">
      Milestone overview with due dates will be added in the next update.
    </div>`;
}

// Tab switching
function switchTab(n) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.getElementById(`tab-content-${n}`).classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === n));
}

function editInput() {
  location.reload();
}
</script>
</body>
</html>
