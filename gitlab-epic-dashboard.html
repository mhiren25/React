<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EpicDash — GitLab Quarter Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0C0D10;
  --surface:   #13151A;
  --surface2:  #1C1F28;
  --border:    #252830;
  --border2:   #2E3240;
  --text:      #E8EAF0;
  --muted:     #6B7280;
  --accent:    #FC6D26;
  --accent2:   #E8431A;
  --green:     #22C55E;
  --blue:      #3B82F6;
  --yellow:    #EAB308;
  --red:       #EF4444;
  --purple:    #A855F7;
  --teal:      #14B8A6;
  --mono:      'Space Mono', monospace;
  --sans:      'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; min-height: 100vh; overflow-x: hidden; }

/* ── SCROLLBARS ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ── SPINNER ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 0.9s linear infinite; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeIn 0.3s ease forwards; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── SETUP SCREEN ── */
#setup-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(252,109,38,0.12), transparent);
}
.setup-card {
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px;
}
.setup-logo { font-family: var(--mono); font-size: 28px; font-weight: 700; letter-spacing: -1px; margin-bottom: 6px; }
.setup-logo span { color: var(--accent); }
.setup-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
.field-group { margin-bottom: 20px; }
.field-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; display: block; }
.field-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.field-input:focus { border-color: var(--accent); }
.field-input::placeholder { color: var(--muted); }
.role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.role-btn {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  color: var(--text);
  font-family: var(--sans);
}
.role-btn .role-icon { font-size: 22px; display: block; margin-bottom: 6px; }
.role-btn .role-name { font-size: 12px; font-weight: 600; display: block; }
.role-btn:hover { border-color: var(--accent); background: rgba(252,109,38,0.05); }
.role-btn.selected { border-color: var(--accent); background: rgba(252,109,38,0.12); color: var(--accent); }
.submit-btn {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.submit-btn:hover { background: var(--accent2); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.setup-error { color: var(--red); font-size: 13px; margin-top: 12px; display: none; }
.saved-badge { font-size: 11px; color: var(--green); background: rgba(34,197,94,0.1); padding: 3px 8px; border-radius: 20px; margin-left: 8px; display: none; }
.forget-link { font-size: 11px; color: var(--muted); text-decoration: underline; cursor: pointer; display: none; margin-top: 8px; }
.forget-link:hover { color: var(--red); }

/* ── LOADING ── */
#loading-screen {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.loader-ring { width: 52px; height: 52px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; }
.loader-text { color: var(--muted); font-size: 13px; font-family: var(--mono); }

/* ── MAIN SHELL ── */
#app { display: none; height: 100vh; flex-direction: column; }
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 54px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-logo { font-family: var(--mono); font-weight: 700; font-size: 16px; letter-spacing: -0.5px; flex-shrink: 0; }
.topbar-logo span { color: var(--accent); }
.topbar-group { font-size: 12px; color: var(--muted); font-family: var(--mono); flex-shrink: 0; }
.quarter-pill {
  background: rgba(252,109,38,0.12);
  border: 1px solid rgba(252,109,38,0.3);
  color: var(--accent);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--mono);
  padding: 3px 10px;
  border-radius: 20px;
  flex-shrink: 0;
}
.spacer { flex: 1; }
.role-badge-top {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}
.topbar-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 5px 12px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.topbar-btn:hover { border-color: var(--border2); color: var(--text); }
.topbar-btn.spinning .btn-icon { animation: spin 0.9s linear infinite; display: inline-block; }

/* ── BODY LAYOUT ── */
.app-body { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-search {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-search input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
}
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search input::placeholder { color: var(--muted); }
.sidebar-scroll { flex: 1; overflow-y: auto; padding: 12px; }
.filter-section { margin-bottom: 20px; }
.filter-section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 8px;
  padding: 0 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.filter-section-count { background: var(--surface2); border-radius: 10px; padding: 1px 6px; font-size: 10px; color: var(--muted); }
.filter-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 7px;
  cursor: pointer;
  transition: background 0.12s;
  font-size: 12px;
  user-select: none;
  border: 1px solid transparent;
}
.filter-chip:hover { background: var(--surface2); }
.filter-chip.active { background: rgba(252,109,38,0.1); border-color: rgba(252,109,38,0.25); color: var(--accent); }
.filter-chip .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.filter-chip .chip-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.filter-chip .chip-count { font-size: 10px; color: var(--muted); font-family: var(--mono); flex-shrink: 0; }
.filter-chip.active .chip-count { color: var(--accent); }
.avatar-sm { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.avatar-placeholder { width: 20px; height: 20px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 8px; color: var(--muted); flex-shrink: 0; }
.clear-filters-btn {
  width: 100%;
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 7px;
  padding: 6px;
  font-size: 11px;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
  margin-bottom: 12px;
}
.clear-filters-btn:hover { border-color: var(--red); color: var(--red); }

/* ── MAIN CONTENT ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── TABS ── */
.tab-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  gap: 0;
  flex-shrink: 0;
}
.tab-item {
  padding: 14px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tab-item:hover { color: var(--text); }
.tab-item.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-badge { background: var(--surface2); border-radius: 10px; padding: 1px 6px; font-size: 10px; font-family: var(--mono); }
.tab-item.active .tab-badge { background: rgba(252,109,38,0.15); color: var(--accent); }

/* ── TAB PANELS ── */
.tab-panel { display: none; flex: 1; overflow-y: auto; padding: 24px; }
.tab-panel.active { display: block; }

/* ── KPI ROW ── */
.kpi-row { display: grid; gap: 14px; margin-bottom: 24px; }
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  transition: border-color 0.15s;
  position: relative;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 14px;
  opacity: 0;
  transition: opacity 0.15s;
}
.kpi-card:hover { border-color: var(--border2); }
.kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
.kpi-value { font-family: var(--mono); font-size: 28px; font-weight: 700; line-height: 1; }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.kpi-accent { color: var(--accent); }
.kpi-green { color: var(--green); }
.kpi-red { color: var(--red); }
.kpi-blue { color: var(--blue); }
.kpi-yellow { color: var(--yellow); }
.kpi-purple { color: var(--purple); }

/* ── PROGRESS BAR ── */
.prog-bar { height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-top: 10px; }
.prog-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.prog-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: right; }

/* ── SECTION HEADER ── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-size: 13px; font-weight: 600; color: var(--text); }
.section-meta { font-size: 11px; color: var(--muted); }

/* ── EPIC CARDS ── */
.epic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
.epic-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  transition: border-color 0.15s;
}
.epic-card:hover { border-color: var(--border2); }
.epic-title { font-size: 14px; font-weight: 600; color: var(--text); text-decoration: none; display: block; margin-bottom: 4px; }
.epic-title:hover { color: var(--accent); }
.epic-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-bottom: 12px; }
.epic-stats { display: flex; gap: 12px; font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.epic-stat { display: flex; align-items: center; gap: 4px; }
.epic-labels { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.label-chip {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
  white-space: nowrap;
  color: #fff;
  opacity: 0.85;
}

/* ── ISSUE ROWS ── */
.issue-group {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 12px;
  overflow: hidden;
}
.issue-group-header {
  padding: 12px 16px;
  background: var(--surface2);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
}
.issue-group-header:hover { background: rgba(255,255,255,0.03); }
.issue-group-title { font-size: 13px; font-weight: 600; flex: 1; }
.issue-group-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.collapse-icon { font-size: 10px; color: var(--muted); transition: transform 0.2s; }
.issue-group.collapsed .collapse-icon { transform: rotate(-90deg); }
.issue-group.collapsed .issue-list { display: none; }
.issue-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  border-top: 1px solid var(--border);
  text-decoration: none;
  color: var(--text);
  transition: background 0.1s;
  font-size: 13px;
}
.issue-row:hover { background: rgba(255,255,255,0.02); }
.issue-id { font-family: var(--mono); font-size: 11px; color: var(--muted); flex-shrink: 0; min-width: 48px; }
.issue-title-cell { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.issue-chips { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
.state-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.state-open { background: var(--green); }
.state-closed { background: var(--muted); }
.badge { font-size: 10px; padding: 1px 7px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
.badge-mr { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
.badge-blocked { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.badge-review { background: rgba(168,85,247,0.15); color: var(--purple); border: 1px solid rgba(168,85,247,0.3); }
.badge-done { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
.badge-inprogress { background: rgba(59,130,246,0.12); color: var(--blue); border: 1px solid rgba(59,130,246,0.25); }
.est-label { font-size: 11px; color: var(--muted); font-family: var(--mono); flex-shrink: 0; }
.assignee-avatars { display: flex; gap: -4px; }
.assignee-avatars img { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--bg); margin-left: -4px; }
.assignee-avatars img:first-child { margin-left: 0; }

/* ── ASSIGNEE SECTION ── */
.assignee-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.assignee-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}
.assignee-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.assignee-avatar { width: 36px; height: 36px; border-radius: 50%; }
.assignee-name { font-weight: 600; font-size: 14px; }
.assignee-stats { font-size: 11px; color: var(--muted); }
.workload-bar { height: 6px; background: var(--surface2); border-radius: 6px; overflow: hidden; margin: 8px 0; }
.workload-fill { height: 100%; border-radius: 6px; }
.assignee-issues { margin-top: 10px; space-y: 4px; }
.assignee-issue-row { font-size: 12px; padding: 4px 0; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 6px; text-decoration: none; color: var(--text); }
.assignee-issue-row:first-child { border-top: none; }
.assignee-issue-row:hover { color: var(--accent); }

/* ── LABEL ANALYSIS ── */
.label-analysis-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 14px; }
.label-group-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}
.label-group-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 12px; }
.label-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.label-bar-name { font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.label-bar-track { flex: 0 0 80px; height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.label-bar-fill { height: 100%; border-radius: 4px; }
.label-bar-count { font-size: 11px; color: var(--muted); font-family: var(--mono); flex-shrink: 0; min-width: 20px; text-align: right; }

/* ── RISK PANEL ── */
.risk-list { display: flex; flex-direction: column; gap: 8px; }
.risk-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--red);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--text);
  font-size: 13px;
  transition: background 0.1s;
}
.risk-item:hover { background: var(--surface2); }
.risk-item.warn { border-left-color: var(--yellow); }
.risk-item.info { border-left-color: var(--blue); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ── QUARTER INPUT ── */
.quarter-input-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  font-size: 13px;
}
.quarter-input-row label { color: var(--muted); font-size: 12px; white-space: nowrap; }
.quarter-input-row input {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 6px 12px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  outline: none;
  width: 140px;
}
.quarter-input-row input:focus { border-color: var(--accent); }
.quarter-input-row button {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 6px 16px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}
.quarter-input-row button:hover { background: var(--accent2); }

/* ── TOOLTIP ── */
.tooltip { position: relative; }
.tooltip:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 999;
}

/* ── HELPER ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.divider { height: 1px; background: var(--border); margin: 20px 0; }
</style>
</head>
<body>

<!-- ═══════════════════════════════ SETUP SCREEN ═══════════════════════════════ -->
<div id="setup-screen">
  <div class="setup-card fade-in">
    <div class="setup-logo">Epic<span>Dash</span> <span class="saved-badge" id="saved-badge">● Saved</span></div>
    <div class="setup-sub">GitLab Quarter Dashboard — PO / SM / DEV / QA</div>

    <div class="field-group">
      <label class="field-label">GitLab Group URL</label>
      <input class="field-input" id="s-url" type="text" placeholder="https://gitlab.com/my-group" autocomplete="off"/>
    </div>
    <div class="field-group">
      <label class="field-label">Personal Access Token</label>
      <input class="field-input" id="s-pat" type="password" placeholder="glpat-…" autocomplete="off"/>
    </div>
    <div class="field-group">

<!-- ═══════════════════════════════ APP ═══════════════════════════════ -->
<div id="app" style="display:none;height:100vh;flex-direction:column;">

  <!-- TOP BAR -->
  <header class="topbar">

    </button>

  </header>

  <div class="app-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <input type="text" placeholder="Search issues…" id="search-box" oninput="applyFilters()"/>
      </div>

        <!-- Status group -->

          <div class="filter-section-title">Status <span class="filter-section-count" id="fs-status-count"></span></div>

          <div id="filter-type"></div>
        </div>

        <div class="filter-section" id="fs-component" style="display:none">
          <div class="filter-section-title">Component / Area <span class="filter-section-count" id="fs-component-count"></span></div>
          <div id="filter-component"></div>
        </div>

        <!-- Other labels -->
        <div class="filter-section" id="fs-other" style="display:none">
          <div class="filter-section-title">Labels <span class="filter-section-count" id="fs-other-count"></span></div>

      <div id="panel-issues"   class="tab-panel" style="display:none"></div>
      <div id="panel-assignees" class="tab-panel" style="display:none"></div>
      <div id="panel-labels"   class="tab-panel" style="display:none"></div>
      <div id="panel-risks"    class="tab-panel" style="display:none"></div>
      <div id="panel-milestones" class="tab-panel" style="display:none"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════
const S = {
  host: '', groupPath: '', pat: '', quarterLabel: '', role: '',
  epics: [], allIssues: [], filteredIssues: [],
  groupLabels: [], milestones: [], rankMap: new Map(),
  activeLabels: new Set(), activeAssignees: new Set(),
  activeTab: 'overview',
};

const ROLE_COLORS = { PO:'#FC6D26', SM:'#14B8A6', DEV:'#3B82F6', QA:'#A855F7' };
const ROLE_LABELS = { PO:'Product Owner', SM:'Scrum Master', DEV:'Developer', QA:'QA Engineer' };

// ═══════════════════════════════════════════════════════════════════════
// SETUP / PERSISTENCE
// ═══════════════════════════════════════════════════════════════════════
let selectedRole = '';

function selectRole(btn) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedRole = btn.dataset.role;
}

function loadSaved() {
  try {
    const cfg = JSON.parse(localStorage.getItem('epicdash_cfg') || '{}');
    if (cfg.url)     document.getElementById('s-url').value = cfg.url;
    if (cfg.pat)     document.getElementById('s-pat').value = cfg.pat;
    if (cfg.quarter) document.getElementById('s-quarter').value = cfg.quarter;
    if (cfg.role) {
      const btn = document.querySelector(`.role-btn[data-role="${cfg.role}"]`);
      if (btn) selectRole(btn);
    }
    if (cfg.url || cfg.pat) {
      document.getElementById('saved-badge').style.display = 'inline';
      document.getElementById('forget-link').style.display = 'inline';
    }
  } catch(e) {}
}

function saveConfig() {
  localStorage.setItem('epicdash_cfg', JSON.stringify({
    url: S.host + '/' + S.groupPath,
    pat: S.pat,
    quarter: S.quarterLabel,
    role: S.role,
  }));
}

function forgetConfig() {
  localStorage.removeItem('epicdash_cfg');
  ['s-url','s-pat','s-quarter'].forEach(id => document.getElementById(id).value = '');
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  selectedRole = '';
  document.getElementById('saved-badge').style.display = 'none';
  document.getElementById('forget-link').style.display = 'none';
}

function changeConfig() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  loadSaved();
}

// ═══════════════════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════════════════
async function glFetch(url) {
  let results = [], next = url;
  while (next) {
    const res = await fetch(next, { headers: { 'PRIVATE-TOKEN': S.pat } });
    if (!res.ok) throw new Error(`GitLab ${res.status} — ${res.statusText}`);
    const data = await res.json();
    if (Array.isArray(data)) results = results.concat(data);
    else return data;
    const link = res.headers.get('Link') || '';
    next = link.match(/<([^>]+)>;\s*rel="next"/)?.[1] || null;
  }
  return results;
}

function setStatus(msg) { document.getElementById('load-status').textContent = msg; }

// ═══════════════════════════════════════════════════════════════════════
// LOAD
// ═══════════════════════════════════════════════════════════════════════
async function startLoad() {
  const urlRaw   = document.getElementById('s-url').value.trim();
  const pat      = document.getElementById('s-pat').value.trim();
  const quarter  = document.getElementById('s-quarter').value.trim();

  if (!urlRaw || !pat || !selectedRole) {
    showErr('Please fill GitLab URL, token, and select a role.');
    return;
  }

  let host, groupPath;
  try {
    const u = new URL(urlRaw);
    host = u.origin;
    groupPath = u.pathname.replace(/^\/groups\//, '').replace(/^\//, '').replace(/\/$/, '');
  } catch {
    showErr('Invalid GitLab URL'); return;
  }

  S.host = host; S.groupPath = groupPath; S.pat = pat;
  S.quarterLabel = quarter; S.role = selectedRole;

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'flex';

  try {
    await fetchAll();
    saveConfig();
    buildApp();
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  } catch(err) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'flex';
    showErr('Failed: ' + err.message);
  }
}

async function fetchAll() {
  const base = `${S.host}/api/v4`;
  const enc  = encodeURIComponent(S.groupPath);

  setStatus('Loading group labels…');
  S.groupLabels = await glFetch(`${base}/groups/${enc}/labels?per_page=100`);

  // Build rank map from Rank:: scoped labels on group labels
  S.rankMap = new Map(); // epic iid → rank number (lower = higher priority)
  S.groupLabels.forEach(l => {
    const m = l.name.match(/^Rank::(\d+)$/i);
    if (m) S.rankMap.set(l.name, parseInt(m[1]));
  });

  setStatus('Loading epics…');
  const epicsRaw = await glFetch(`${base}/groups/${enc}/epics?state=opened&per_page=100`);

  setStatus('Loading milestones…');
  S.milestones = await glFetch(`${base}/groups/${enc}/milestones?state=active&per_page=100`);

  setStatus(`Loading issues for ${epicsRaw.length} epics…`);
  const epicData = await Promise.all(epicsRaw.map(async ep => {
    const issues = await glFetch(`${base}/groups/${enc}/epics/${ep.iid}/issues?per_page=100`);
    // Fetch MR count for each issue in parallel
    const enriched = await Promise.all(issues.map(async i => {
      let mrCount = i.merge_requests_count || 0;
      // If not included in payload, try fetching
      if (!mrCount && i.project_id && i.iid) {
        try {
          const mrs = await glFetch(`${base}/projects/${i.project_id}/issues/${i.iid}/related_merge_requests?per_page=5`);
          mrCount = Array.isArray(mrs) ? mrs.length : 0;
        } catch(e) { mrCount = 0; }
      }
      return enrichIssue({ ...i, _mrCount: mrCount });
    }));
    return { epic: ep, issues: enriched };
  }));

  S.epics = epicData;
  S.allIssues = epicData.flatMap(e => e.issues);
  S.filteredIssues = [...S.allIssues];
}

async function refreshData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  btn.disabled = true;
  try {
    await fetchAll();
    applyFilters();
  } catch(e) { alert('Refresh failed: ' + e.message); }
  btn.classList.remove('spinning');
  btn.disabled = false;
}

// ═══════════════════════════════════════════════════════════════════════
// ENRICH ISSUE
// ═══════════════════════════════════════════════════════════════════════
function enrichIssue(i) {
  // labels: GitLab epic-issues API returns labels as array of strings
  const labels = Array.isArray(i.labels) ? i.labels.map(l => typeof l === 'string' ? l : l.name) : [];

  const scopedMap = {};
  const plainLabels = [];
  labels.forEach(l => {
    const idx = l.indexOf('::');
    if (idx > 0) {
      const scope = l.slice(0, idx).trim();
      const val   = l.slice(idx + 2).trim();
      if (!scopedMap[scope]) scopedMap[scope] = [];
      scopedMap[scope].push(val);
    } else {
      plainLabels.push(l);
    }
  });

  // ── ESTIMATE: try time_stats first, then Estimate:: scoped label ──
  // Estimate label values can be: "3pd", "3 pd", "1pw", "2 weeks", "5sp" etc.
  let estimatePd = 0;
  if (i.time_stats?.time_estimate) {
    estimatePd = Math.round(i.time_stats.time_estimate / 28800);
  } else if (scopedMap['Estimate'] && scopedMap['Estimate'].length > 0) {
    const raw = scopedMap['Estimate'][0].trim();
    // Match patterns: "3pd", "3 pd", "3d", "1pw", "1w", "2 weeks", "5sp", "8", "3days"
    const m = raw.match(/^(\d+(?:\.\d+)?)\s*(pd|pw|sp|d|w|days?|weeks?|points?)?$/i);
    if (m) {
      const n = parseFloat(m[1]);
      const u = (m[2] || 'pd').toLowerCase();
      if (u.startsWith('w')) estimatePd = Math.round(n * 5);
      else estimatePd = Math.round(n); // pd, d, sp, points all treated as person-days
    }
  }

  const statusVal = (scopedMap['Status'] || [])[0] || '';
  const isBlocked  = statusVal.toLowerCase().includes('block') || labels.some(l => l.toLowerCase() === 'blocked');
  const inReview   = statusVal.toLowerCase().includes('review');
  const inProgress = statusVal.toLowerCase().includes('progress') || statusVal.toLowerCase().includes('doing') || statusVal.toLowerCase().includes('wip');
  const isDone     = statusVal.toLowerCase().includes('done') || statusVal.toLowerCase().includes('complete') || i.state === 'closed';

  // ── COMMITTED: match full label string exactly (handles "Committed: 26Q2" with single colon too) ──
  // The user's label may be "Committed: 26Q2" (single colon + space) OR "Committed::26Q2"
  // We store the full label string and match against it directly
  const isCommitted = S.quarterLabel
    ? labels.some(l => l === S.quarterLabel || l.replace(/\s*::\s*/g,':: ').trim() === S.quarterLabel.trim())
    : false;

  // MR count: use _mrCount if fetched, else merge_requests_count from payload
  const mrCount = i._mrCount || i.merge_requests_count || 0;

  return {
    ...i,
    labels,
    scopedMap,
    plainLabels,
    estimatePd,
    isBlocked,
    inReview,
    inProgress,
    isDone,
    isCommitted,
    mrCount,
  };
}

// ═══════════════════════════════════════════════════════════════════════
// BUILD APP
// ═══════════════════════════════════════════════════════════════════════
function buildApp() {
  // Topbar
  document.getElementById('tb-group').textContent = S.groupPath;
  const qp = document.getElementById('tb-quarter');
  if (S.quarterLabel) { qp.textContent = S.quarterLabel; qp.style.display = 'inline'; }
  const rb = document.getElementById('tb-role');
  rb.textContent = ROLE_LABELS[S.role];
  rb.style.background = ROLE_COLORS[S.role] + '22';
  rb.style.color = ROLE_COLORS[S.role];

  buildSidebar();
  buildTabs();
  renderAll();
}

// ═══════════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════════
const SCOPED_GROUPS = {
  status:    { prefix: 'Status',    el: 'filter-status',    sec: 'fs-status',    cnt: 'fs-status-count' },
  priority:  { prefix: 'Priority',  el: 'filter-priority',  sec: 'fs-priority',  cnt: 'fs-priority-count' },
  type:      { prefix: 'Type',      el: 'filter-type',      sec: 'fs-type',      cnt: 'fs-type-count' },
  component: { prefix: 'Component', el: 'filter-component', sec: 'fs-component', cnt: 'fs-component-count' },
};
const ALT_PREFIXES = { component: ['Area', 'Component'] };

function buildSidebar() {
  // Compute label usage
  const usage = new Map(); // label string → count
  S.allIssues.forEach(i => i.labels.forEach(l => usage.set(l, (usage.get(l)||0)+1)));

  // Color map from group labels
  const colorMap = new Map();
  S.groupLabels.forEach(l => colorMap.set(l.name, l.color || '#6B7280'));

  // Scoped filter groups
  for (const [key, cfg] of Object.entries(SCOPED_GROUPS)) {
    const prefixes = ALT_PREFIXES[key] || [cfg.prefix];
    const entries = [];
    for (const [lbl, cnt] of usage.entries()) {
      const idx = lbl.indexOf('::');
      if (idx > 0) {
        const scope = lbl.slice(0, idx);
        if (prefixes.includes(scope)) entries.push({ lbl, cnt, val: lbl.slice(idx+2) });
      }
    }
    entries.sort((a,b) => b.cnt - a.cnt);
    if (entries.length === 0) continue;
    document.getElementById(cfg.sec).style.display = '';
    document.getElementById(cfg.cnt).textContent = entries.length;
    document.getElementById(cfg.el).innerHTML = entries.map(e => filterChipHTML(e.lbl, e.val, e.cnt, colorMap.get(e.lbl))).join('');
  }

  // Other (non-scoped, non-quarter) labels
  const scoped_prefixes = new Set(['Status','Priority','Type','Component','Area','Estimate','Committed','Increment','Team','Squad']);
  const otherEntries = [];
  for (const [lbl, cnt] of usage.entries()) {
    const idx = lbl.indexOf('::');
    if (idx > 0 && scoped_prefixes.has(lbl.slice(0, idx))) continue;
    if (lbl === S.quarterLabel) continue;
    otherEntries.push({ lbl, cnt });
  }
  otherEntries.sort((a,b) => b.cnt - a.cnt);
  if (otherEntries.length) {
    document.getElementById('fs-other').style.display = '';
    document.getElementById('fs-other-count').textContent = otherEntries.length;
    document.getElementById('filter-other').innerHTML = otherEntries.slice(0, 30).map(e => filterChipHTML(e.lbl, e.lbl, e.cnt, colorMap.get(e.lbl))).join('');
  }

  // Assignees
  const aMap = new Map();
  S.allIssues.forEach(i => (i.assignees||[]).forEach(a => { if(!aMap.has(a.id)) aMap.set(a.id,{a,cnt:0}); aMap.get(a.id).cnt++; }));
  const aEntries = [...aMap.values()].sort((x,y) => y.cnt-x.cnt);
  document.getElementById('fs-assignees-count').textContent = aEntries.length;
  document.getElementById('filter-assignees').innerHTML = aEntries.map(({a,cnt}) => `
    <div class="filter-chip" data-assignee="${a.id}" onclick="toggleAssignee(this)">
      ${a.avatar_url ? `<img class="avatar-sm" src="${a.avatar_url}" alt="">` : `<div class="avatar-placeholder">${(a.name||'?')[0]}</div>`}
      <span class="chip-label">${a.name || a.username}</span>
      <span class="chip-count">${cnt}</span>
    </div>`).join('');
}

function filterChipHTML(lbl, displayName, cnt, color) {
  const dot = `<span class="chip-dot" style="background:${color||'#6B7280'}"></span>`;
  // IMPORTANT: data-label must NOT be html-escaped — dataset.label returns raw value
  return `<div class="filter-chip" data-label="${lbl.replace(/"/g,'&quot;')}" onclick="toggleLabel(this)">
    ${dot}<span class="chip-label">${esc(displayName)}</span><span class="chip-count">${cnt}</span>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════════════════════
function toggleLabel(el) {
  const lbl = el.dataset.label;
  S.activeLabels.has(lbl) ? S.activeLabels.delete(lbl) : S.activeLabels.add(lbl);
  el.classList.toggle('active');
  updateClearBtn();
  applyFilters();
}
function toggleAssignee(el) {
  const id = parseInt(el.dataset.assignee);
  S.activeAssignees.has(id) ? S.activeAssignees.delete(id) : S.activeAssignees.add(id);
  el.classList.toggle('active');
  updateClearBtn();
  applyFilters();
}
function clearFilters() {
  S.activeLabels.clear(); S.activeAssignees.clear();
  document.getElementById('search-box').value = '';
  document.querySelectorAll('.filter-chip.active').forEach(c => c.classList.remove('active'));
  updateClearBtn();
  applyFilters();
}
function updateClearBtn() {
  const hasFilters = S.activeLabels.size > 0 || S.activeAssignees.size > 0 || document.getElementById('search-box').value;
  document.getElementById('clear-btn').style.display = hasFilters ? '' : 'none';
}

function applyFilters() {
  updateClearBtn();
  const term = document.getElementById('search-box').value.toLowerCase();
  S.filteredIssues = S.allIssues.filter(i => {
    if (term && !i.title.toLowerCase().includes(term) && !String(i.iid).includes(term)) return false;
    if (S.activeLabels.size > 0) {
      const has = [...S.activeLabels].every(l => i.labels.includes(l));
      if (!has) return false;
    }
    if (S.activeAssignees.size > 0) {
      const ids = new Set((i.assignees||[]).map(a=>a.id));
      if (![...S.activeAssignees].some(id => ids.has(id))) return false;
    }
    return true;
  });
  renderAll();
}

// ═══════════════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════════════
const TAB_DEFS = {
  PO:  ['overview','issues','milestones','labels','risks'],
  SM:  ['overview','issues','assignees','milestones','risks'],
  DEV: ['issues','assignees','milestones','overview'],
  QA:  ['issues','milestones','labels','risks'],
};
const TAB_META = {
  overview:   { label:'Quarter Overview', icon:'📊' },
  issues:     { label:'Issues',           icon:'📋' },
  assignees:  { label:'Team Load',        icon:'👥' },
  labels:     { label:'Label Analysis',   icon:'🏷' },
  risks:      { label:'Risks & Blockers', icon:'⚠️' },
  milestones: { label:'Milestones',       icon:'🎯' },
};

function buildTabs() {
  const tabs = TAB_DEFS[S.role] || ['overview','issues'];
  S.activeTab = tabs[0];
  document.getElementById('tab-bar').innerHTML = tabs.map(t => `
    <div class="tab-item ${t===S.activeTab?'active':''}" data-tab="${t}" onclick="switchTab('${t}')">
      ${TAB_META[t].icon} ${TAB_META[t].label}
      <span class="tab-badge" id="tab-badge-${t}"></span>
    </div>`).join('');

  // Show panels
  tabs.forEach(t => { document.getElementById(`panel-${t}`).style.display = 'none'; });
  document.getElementById(`panel-${S.activeTab}`).style.display = 'block';
  document.getElementById(`panel-${S.activeTab}`).classList.add('active');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(el => { el.style.display='none'; el.classList.remove('active'); });
  document.getElementById(`panel-${tab}`).style.display = 'block';
  document.getElementById(`panel-${tab}`).classList.add('active');
  S.activeTab = tab;
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════════════════════════════
function renderAll() {
  const tabs = TAB_DEFS[S.role] || [];
  if (tabs.includes('overview'))    renderOverview();
  if (tabs.includes('issues'))      renderIssues();
  if (tabs.includes('assignees'))   renderAssignees();
  if (tabs.includes('labels'))      renderLabels();
  if (tabs.includes('risks'))       renderRisks();
  if (tabs.includes('milestones'))  renderMilestones();
  updateTabBadges();
}

function updateTabBadges() {
  const fi = S.filteredIssues;
  const setBadge = (id, val) => { const el = document.getElementById(`tab-badge-${id}`); if(el) el.textContent = val||''; };
  setBadge('issues', fi.length);
  setBadge('overview', fi.filter(i=>i.isCommitted).length || fi.length);
  setBadge('risks', fi.filter(i=>i.isBlocked).length || '');
  setBadge('milestones', S.milestones.length || '');
  const assigneeCount = new Set(fi.flatMap(i=>(i.assignees||[]).map(a=>a.id))).size;
  setBadge('assignees', assigneeCount || '');
}

// ═══════════════════════════════════════════════════════════════════════
// OVERVIEW TAB
// ═══════════════════════════════════════════════════════════════════════
function renderOverview() {
  const fi = S.filteredIssues;
  const committed = S.quarterLabel ? fi.filter(i=>i.isCommitted) : fi;
  const total   = committed.length;
  const closed  = committed.filter(i=>i.state==='closed').length;
  const open    = total - closed;
  const blocked = committed.filter(i=>i.isBlocked).length;
  const noEst   = committed.filter(i=>!i.estimatePd).length;
  const noAss   = committed.filter(i=>!(i.assignees||[]).length).length;
  const totalPd = committed.reduce((s,i)=>s+(i.estimatePd||0),0);
  const donePd  = committed.filter(i=>i.state==='closed').reduce((s,i)=>s+(i.estimatePd||0),0);
  const pct     = total ? Math.round(closed/total*100) : 0;
  const color   = pct>=75?'var(--green)':pct>=40?'var(--yellow)':'var(--red)';

  let kpisHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px">
      ${kpiCard('Committed', total, '', 'var(--accent)', S.quarterLabel || 'all issues')}
      ${kpiCard('Closed', closed, '', 'var(--green)', pct+'% complete')}
      ${kpiCard('Open', open, '', open>0?'var(--blue)':'var(--green)', committed.filter(i=>i.inProgress).length+' in progress')}
      ${kpiCard('Blocked', blocked, '⚠', blocked>0?'var(--red)':'var(--muted)', blocked>0?'needs attention':'all clear')}
      ${kpiCard('Est. Total', totalPd?totalPd+'pd':'—', '', 'var(--blue)', donePd?donePd+'pd done':'none closed yet')}
      ${kpiCard('No Estimate', noEst, '!', noEst>0?'var(--yellow)':'var(--muted)', 'missing estimate')}
      ${kpiCard('Unassigned', noAss, '', noAss>0?'var(--yellow)':'var(--muted)', 'no assignee')}
    </div>`;

  // Quarter progress bar
  kpisHTML += `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:24px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:13px;font-weight:600">${S.quarterLabel || 'Quarter'} Progress</div>
        <div style="font-family:var(--mono);font-size:13px;color:${color}">${pct}%</div>
      </div>
      <div class="prog-bar" style="height:8px">
        <div class="prog-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px">
        <span>${closed} closed</span><span>${open} remaining</span>
      </div>
    </div>`;

  // ── Sort epics by Rank:: label on the epic itself ──
  // Epic labels come from epic.labels (array of strings on epic object)
  function getEpicRank(ep) {
    const epicLabels = Array.isArray(ep.labels) ? ep.labels.map(l => typeof l==='string'?l:l.name) : [];
    for (const lbl of epicLabels) {
      const m = lbl.match(/^Rank::(\d+)$/i);
      if (m) return parseInt(m[1]);
    }
    return 9999;
  }

  const sortedEpics = [...S.epics].sort((a, b) => getEpicRank(a.epic) - getEpicRank(b.epic));

  kpisHTML += `<div style="font-size:13px;font-weight:600;margin-bottom:12px">Epics (${sortedEpics.length})</div>
    <div class="epic-grid">`;

  sortedEpics.forEach(({epic, issues}) => {
    const filtered = issues.filter(i => S.filteredIssues.some(f=>f.id===i.id));
    const isEmpty  = filtered.length === 0;

    // Get all issues for this epic (not just filtered) to detect truly empty epics
    const hasAnyIssues = issues.length > 0;

    const epicClosed  = filtered.filter(i=>i.state==='closed').length;
    const epicPct     = filtered.length ? Math.round(epicClosed/filtered.length*100) : 0;
    const epicPd      = filtered.reduce((s,i)=>s+(i.estimatePd||0),0);
    const epicBlocked = filtered.filter(i=>i.isBlocked).length;
    const epicPcol    = epicPct>=75?'var(--green)':epicPct>=40?'var(--yellow)':'var(--accent)';

    // Rank label
    const epicLabels = Array.isArray(epic.labels) ? epic.labels.map(l=>typeof l==='string'?l:l.name) : [];
    const rankLabel  = epicLabels.find(l=>/^Rank::/i.test(l));
    const rankNum    = rankLabel ? rankLabel.replace(/^Rank::/i,'') : null;

    // ── Empty epic: red border warning ──
    const borderStyle = !hasAnyIssues
      ? 'border-color:#EF444466;background:rgba(239,68,68,0.04)'
      : '';

    const emptyBanner = !hasAnyIssues
      ? `<div style="font-size:11px;color:var(--red);background:rgba(239,68,68,0.1);border-radius:6px;padding:4px 8px;margin-bottom:10px">⚠ No issues linked to this epic</div>`
      : '';

    const statusVals = [...new Set(filtered.flatMap(i=>i.scopedMap['Status']||[]))].slice(0,3);

    kpisHTML += `
      <div class="epic-card" style="${borderStyle}">
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:4px">
          ${rankNum ? `<span style="font-family:var(--mono);font-size:10px;background:rgba(252,109,38,0.15);color:var(--accent);padding:2px 7px;border-radius:10px;flex-shrink:0;margin-top:2px">#${rankNum}</span>` : ''}
          <a href="${epic.web_url}" target="_blank" class="epic-title" style="margin-bottom:0">${esc(epic.title)}</a>
        </div>
        <div class="epic-meta">#${epic.iid} · ${filtered.length} issues</div>
        ${emptyBanner}
        ${!isEmpty ? `
        <div class="epic-stats">
          <span class="epic-stat" style="color:var(--green)">✓ ${epicClosed} closed</span>
          <span class="epic-stat" style="color:var(--blue)">◷ ${filtered.length - epicClosed} open</span>
          ${epicBlocked ? `<span class="epic-stat" style="color:var(--red)">⚠ ${epicBlocked} blocked</span>` : ''}
          ${epicPd ? `<span class="epic-stat" style="color:var(--muted)">${epicPd}pd</span>` : ''}
        </div>
        <div class="prog-bar">
          <div class="prog-fill" style="width:${epicPct}%;background:${epicPcol}"></div>
        </div>
        <div style="font-size:10px;color:${epicPcol};text-align:right;margin-top:4px;font-family:var(--mono)">${epicPct}%</div>
        ${statusVals.length ? `<div class="epic-labels">${statusVals.map(v=>`<span class="label-chip" style="background:#374151">${esc(v)}</span>`).join('')}</div>` : ''}
        ` : ''}
      </div>`;
  });
  kpisHTML += '</div>';

  document.getElementById('panel-overview').innerHTML = kpisHTML;
}

function kpiCard(label, value, icon, color, sub) {
  return `<div class="kpi-card">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value" style="color:${color}">${icon?icon+' ':''}${value}</div>
    <div class="kpi-sub">${sub}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// ISSUES TAB
// ═══════════════════════════════════════════════════════════════════════
function renderIssues() {
  function getEpicRank(ep) {
    const epicLabels = Array.isArray(ep.labels) ? ep.labels.map(l=>typeof l==='string'?l:l.name) : [];
    for (const lbl of epicLabels) { const m=lbl.match(/^Rank::(\d+)$/i); if(m) return parseInt(m[1]); }
    return 9999;
  }
  const sortedEpics = [...S.epics].sort((a,b) => getEpicRank(a.epic) - getEpicRank(b.epic));

  let html = '';
  sortedEpics.forEach(({epic, issues}) => {
    const filtered = issues.filter(i => S.filteredIssues.some(f=>f.id===i.id));
    if (!filtered.length) return;

    const closed  = filtered.filter(i=>i.state==='closed').length;
    const blocked = filtered.filter(i=>i.isBlocked).length;
    const totalPd = filtered.reduce((s,i)=>s+(i.estimatePd||0),0);

    const epicLabels = Array.isArray(epic.labels) ? epic.labels.map(l=>typeof l==='string'?l:l.name) : [];
    const rankLabel  = epicLabels.find(l=>/^Rank::/i.test(l));
    const rankNum    = rankLabel ? rankLabel.replace(/^Rank::/i,'') : null;
    const rankBadge  = rankNum ? `<span style="font-family:var(--mono);font-size:10px;background:rgba(252,109,38,0.15);color:var(--accent);padding:1px 6px;border-radius:8px">#${rankNum}</span>` : '';

    html += `
      <div class="issue-group" id="ig-${epic.iid}">
        <div class="issue-group-header" onclick="toggleGroup('ig-${epic.iid}')">
          <span class="collapse-icon">▾</span>
          ${rankBadge}
          <span class="issue-group-title">${esc(epic.title)}</span>
          <span class="issue-group-meta">${closed}/${filtered.length} closed${blocked?` · ⚠${blocked} blocked`:''}${totalPd?` · ${totalPd}pd`:''}</span>
          <a href="${epic.web_url}" target="_blank" style="font-size:11px;color:var(--muted);text-decoration:none;margin-left:8px" onclick="event.stopPropagation()">↗</a>
        </div>
        <div class="issue-list">`;

    filtered.forEach(i => {
      const assigneeImgs = (i.assignees||[]).slice(0,3).map(a =>
        a.avatar_url
          ? `<img src="${a.avatar_url}" title="${esc(a.name||a.username)}" style="width:18px;height:18px;border-radius:50%;border:1px solid var(--bg);margin-left:-4px">`
          : `<div style="width:18px;height:18px;border-radius:50%;background:var(--surface2);display:inline-flex;align-items:center;justify-content:center;font-size:8px;margin-left:-4px;">${(a.name||'?')[0]}</div>`
      ).join('');

      let statusBadge = '';
      if (i.isBlocked)             statusBadge = '<span class="badge badge-blocked">Blocked</span>';
      else if (i.inReview)         statusBadge = '<span class="badge badge-review">Review</span>';
      else if (i.state==='closed') statusBadge = '<span class="badge badge-done">Done</span>';
      else if (i.inProgress)       statusBadge = '<span class="badge badge-inprogress">In Progress</span>';

      const typeVal     = (i.scopedMap['Type']||[])[0] || '';
      const priorityVal = (i.scopedMap['Priority']||[])[0] || '';
      const labelChips  = [];
      if (typeVal) labelChips.push(`<span class="badge" style="background:rgba(20,184,166,0.12);color:var(--teal);border:1px solid rgba(20,184,166,0.25)">${esc(typeVal)}</span>`);
      if (priorityVal) {
        const pc = priorityVal.toLowerCase().includes('high')?'var(--red)':priorityVal.toLowerCase().includes('med')?'var(--yellow)':'var(--muted)';
        labelChips.push(`<span class="badge" style="background:rgba(0,0,0,0.2);color:${pc};border:1px solid ${pc}44">${esc(priorityVal)}</span>`);
      }

      html += `
        <a href="${i.web_url}" target="_blank" class="issue-row">
          <div class="state-dot ${i.state==='closed'?'state-closed':'state-open'}"></div>
          <div class="issue-id">#${i.iid}</div>
          <div class="issue-title-cell">${esc(i.title)}</div>
          <div class="issue-chips">
            ${statusBadge}
            ${labelChips.join('')}
            ${i.mrCount ? `<span class="badge badge-mr">MR ×${i.mrCount}</span>` : ''}
            ${i.estimatePd ? `<span class="est-label">${i.estimatePd}pd</span>` : ''}
            <div style="display:flex;margin-left:4px">${assigneeImgs}</div>
          </div>
        </a>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('panel-issues').innerHTML = html || `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No issues match your filters</div></div>`;
}

function toggleGroup(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

// ═══════════════════════════════════════════════════════════════════════
// ASSIGNEES TAB
// ═══════════════════════════════════════════════════════════════════════
function renderAssignees() {
  const aMap = new Map();
  S.filteredIssues.forEach(i => {
    (i.assignees||[]).forEach(a => {
      if (!aMap.has(a.id)) aMap.set(a.id, { user: a, issues: [], pd: 0 });
      const entry = aMap.get(a.id);
      entry.issues.push(i);
      entry.pd += i.estimatePd || 0;
    });
  });

  const maxPd = Math.max(...[...aMap.values()].map(e=>e.pd), 1);

  // KPIs
  const unassigned = S.filteredIssues.filter(i=>!(i.assignees||[]).length);
  let html = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px">
      ${kpiCard('Team Members', aMap.size, '', 'var(--blue)', 'with issues')}
      ${kpiCard('Unassigned', unassigned.length, unassigned.length?'!':'', unassigned.length?'var(--yellow)':'var(--green)', 'need owner')}
    </div>`;

  if (unassigned.length) {
    html += `<div style="background:rgba(234,179,8,0.06);border:1px solid rgba(234,179,8,0.2);border-radius:14px;padding:16px;margin-bottom:24px">
      <div style="font-size:12px;font-weight:600;color:var(--yellow);margin-bottom:8px">⚠ Unassigned Issues</div>
      ${unassigned.map(i=>`<a href="${i.web_url}" target="_blank" class="assignee-issue-row" style="display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--text);font-size:12px;padding:4px 0;border-top:1px solid var(--border)">
        <div class="state-dot ${i.state==='closed'?'state-closed':'state-open'}"></div>
        <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">#${i.iid}</span>
        <span>${esc(i.title)}</span>
      </a>`).join('')}
    </div>`;
  }

  html += `<div class="assignee-grid">`;

  [...aMap.values()].sort((a,b)=>b.pd-a.pd || b.issues.length-a.issues.length).forEach(({user, issues, pd}) => {
    const open   = issues.filter(i=>i.state!=='closed').length;
    const blocked= issues.filter(i=>i.isBlocked).length;
    const pct    = maxPd ? Math.round(pd/maxPd*100) : 0;
    const wcolor = pct>80?'var(--red)':pct>50?'var(--yellow)':'var(--green)';

    html += `
      <div class="assignee-card">
        <div class="assignee-header">
          ${user.avatar_url ? `<img class="assignee-avatar" src="${user.avatar_url}" alt="">` : `<div class="assignee-avatar" style="background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px">${(user.name||'?')[0]}</div>`}
          <div>
            <div class="assignee-name">${esc(user.name||user.username)}</div>
            <div class="assignee-stats">${issues.length} issues · ${pd||'no'} pd</div>
          </div>
        </div>
        <div style="display:flex;gap:10px;font-size:11px;color:var(--muted);margin-bottom:8px">
          <span style="color:var(--blue)">◷ ${open} open</span>
          <span style="color:var(--green)">✓ ${issues.length-open} closed</span>
          ${blocked?`<span style="color:var(--red)">⚠ ${blocked} blocked</span>`:''}
        </div>
        <div class="workload-bar"><div class="workload-fill" style="width:${pct}%;background:${wcolor}"></div></div>
        <div style="font-size:10px;color:${wcolor};text-align:right;font-family:var(--mono)">${pd}pd workload</div>
        <div class="assignee-issues">
          ${issues.slice(0,8).map(i=>`<a href="${i.web_url}" target="_blank" class="assignee-issue-row">
            <div class="state-dot ${i.state==='closed'?'state-closed':'state-open'}"></div>
            <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">#${i.iid}</span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${esc(i.title)}</span>
            ${i.isBlocked?'<span style="color:var(--red);font-size:10px">⚠</span>':''}
          </a>`).join('')}
          ${issues.length>8?`<div style="font-size:11px;color:var(--muted);padding-top:4px;border-top:1px solid var(--border)">+${issues.length-8} more</div>`:''}
        </div>
      </div>`;
  });

  html += '</div>';
  document.getElementById('panel-assignees').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════
// LABELS TAB
// ═══════════════════════════════════════════════════════════════════════
function renderLabels() {
  const colorMap = new Map();
  S.groupLabels.forEach(l => colorMap.set(l.name, l.color||'#6B7280'));

  // Group by scope prefix
  const groups = new Map(); // prefix → [{label, count}]
  const usage  = new Map();
  S.filteredIssues.forEach(i => i.labels.forEach(l => usage.set(l,(usage.get(l)||0)+1)));

  usage.forEach((cnt, lbl) => {
    const idx = lbl.indexOf('::');
    const group = idx > 0 ? lbl.slice(0, idx) : '(plain)';
    if (!groups.has(group)) groups.set(group, []);
    groups.get(group).push({ lbl, val: idx>0?lbl.slice(idx+2):lbl, cnt });
  });

  let html = `<div style="font-size:13px;font-weight:600;margin-bottom:16px">Label Distribution — ${S.filteredIssues.length} issues</div>
    <div class="label-analysis-grid">`;

  [...groups.entries()].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([group, entries]) => {
    const sorted = entries.sort((a,b)=>b.cnt-a.cnt);
    const maxCnt = sorted[0]?.cnt || 1;
    html += `<div class="label-group-card">
      <div class="label-group-title">${esc(group)} <span style="color:var(--muted);font-size:10px">(${sorted.length})</span></div>
      ${sorted.map(({lbl,val,cnt}) => {
        const color = colorMap.get(lbl) || '#6B7280';
        return `<div class="label-bar-row">
          <div class="chip-dot" style="background:${color};width:8px;height:8px;border-radius:50%;flex-shrink:0"></div>
          <div class="label-bar-name" title="${esc(lbl)}">${esc(val)}</div>
          <div class="label-bar-track"><div class="label-bar-fill" style="width:${Math.round(cnt/maxCnt*100)}%;background:${color}66"></div></div>
          <div class="label-bar-count">${cnt}</div>
        </div>`;
      }).join('')}
    </div>`;
  });

  html += '</div>';
  document.getElementById('panel-labels').innerHTML = html || `<div class="empty"><div class="empty-icon">🏷</div><div class="empty-text">No labels in filtered issues</div></div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// RISKS TAB
// ═══════════════════════════════════════════════════════════════════════
function renderRisks() {
  const fi = S.filteredIssues.filter(i=>i.state!=='closed');
  const blocked  = fi.filter(i=>i.isBlocked);
  const noEst    = fi.filter(i=>!i.estimatePd);
  const noAss    = fi.filter(i=>!(i.assignees||[]).length);
  const highPri  = fi.filter(i=>(i.scopedMap['Priority']||[]).some(p=>p.toLowerCase().includes('high')));
  const inReview = fi.filter(i=>i.inReview);

  let html = '';

  // KPIs
  html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px">
    ${kpiCard('Blocked', blocked.length, '🚫', blocked.length?'var(--red)':'var(--green)', 'open issues')}
    ${kpiCard('No Estimate', noEst.length, '?', noEst.length?'var(--yellow)':'var(--green)', 'missing sizing')}
    ${kpiCard('Unassigned', noAss.length, '', noAss.length?'var(--yellow)':'var(--green)', 'no owner')}
    ${kpiCard('High Priority', highPri.length, '🔴', highPri.length?'var(--red)':'var(--muted)', 'open issues')}
    ${kpiCard('In Review', inReview.length, '', 'var(--purple)', 'awaiting review')}
  </div>`;

  const section = (title, items, cls, icon, empty) => {
    if (!items.length) return `<div style="margin-bottom:20px"><div class="section-header"><div class="section-title">${icon} ${title} <span style="color:var(--green);font-size:12px;font-weight:400">✓ none</span></div></div></div>`;
    return `<div style="margin-bottom:24px">
      <div class="section-header"><div class="section-title">${icon} ${title} <span style="color:var(--muted);font-size:12px;font-weight:400">(${items.length})</span></div></div>
      <div class="risk-list">
        ${items.map(i=>`<a href="${i.web_url}" target="_blank" class="risk-item ${cls}">
          <div class="state-dot state-open"></div>
          <span style="font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0">#${i.iid}</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(i.title)}</span>
          ${(i.assignees||[]).length?`<span style="font-size:11px;color:var(--muted)">${esc((i.assignees[0].name||i.assignees[0].username).split(' ')[0])}</span>`:'<span style="font-size:11px;color:var(--yellow)">unassigned</span>'}
          ${i.estimatePd?`<span style="font-family:var(--mono);font-size:11px;color:var(--muted)">${i.estimatePd}pd</span>`:''}
        </a>`).join('')}
      </div></div>`;
  };

  html += section('Blocked Issues',      blocked,  '',     '🚫', 'No blocked issues');
  html += section('High Priority Open',  highPri,  '',     '🔴', 'No high priority issues');
  html += section('No Estimate',         noEst,    'warn', '?',  'All issues have estimates');
  html += section('Unassigned',          noAss,    'warn', '👤', 'All issues assigned');
  html += section('In Review',           inReview, 'info', '👁', 'Nothing in review');

  document.getElementById('panel-risks').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════
// MILESTONES TAB
// ═══════════════════════════════════════════════════════════════════════
function renderMilestones() {
  const milestones = S.milestones || [];

  // Map issues to their milestone
  const msIssues = new Map(); // milestone id → issues[]
  S.filteredIssues.forEach(i => {
    if (!i.milestone) return;
    const mid = i.milestone.id;
    if (!msIssues.has(mid)) msIssues.set(mid, []);
    msIssues.get(mid).push(i);
  });

  // Sort milestones: by due_date asc, no-date last
  const sorted = [...milestones].sort((a,b) => {
    if (!a.due_date && !b.due_date) return 0;
    if (!a.due_date) return 1;
    if (!b.due_date) return -1;
    return new Date(a.due_date) - new Date(b.due_date);
  });

  const now = new Date();
  const totalMs = sorted.length;
  const withIssues = sorted.filter(m => msIssues.has(m.id)).length;

  let html = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px">
      ${kpiCard('Milestones', totalMs, '', 'var(--blue)', 'active')}
      ${kpiCard('With Issues', withIssues, '', 'var(--green)', 'in filtered view')}
      ${kpiCard('Upcoming', sorted.filter(m=>m.due_date && new Date(m.due_date)>now).length, '', 'var(--accent)', 'not yet due')}
      ${kpiCard('Overdue', sorted.filter(m=>m.due_date && new Date(m.due_date)<now && m.state!=='closed').length, '!', 'var(--red)', 'past due date')}
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">`;

  if (sorted.length === 0) {
    html += `<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">No active milestones found</div></div>`;
  }

  sorted.forEach(m => {
    const issues   = msIssues.get(m.id) || [];
    const closed   = issues.filter(i=>i.state==='closed').length;
    const open     = issues.length - closed;
    const totalPd  = issues.reduce((s,i)=>s+(i.estimatePd||0),0);
    const pct      = issues.length ? Math.round(closed/issues.length*100) : 0;
    const dueDate  = m.due_date ? new Date(m.due_date) : null;
    const isOver   = dueDate && dueDate < now;
    const daysLeft = dueDate ? Math.ceil((dueDate-now)/(1000*60*60*24)) : null;
    const pctColor = pct>=75?'var(--green)':pct>=40?'var(--yellow)':'var(--blue)';
    const borderCol = isOver ? '#EF444444' : 'var(--border)';

    let dueBadge = '';
    if (!dueDate) {
      dueBadge = `<span style="font-size:11px;color:var(--muted)">No due date</span>`;
    } else if (isOver) {
      dueBadge = `<span style="font-size:11px;color:var(--red);background:rgba(239,68,68,0.1);padding:2px 8px;border-radius:10px">⚠ Overdue · ${m.due_date}</span>`;
    } else if (daysLeft <= 14) {
      dueBadge = `<span style="font-size:11px;color:var(--yellow);background:rgba(234,179,8,0.1);padding:2px 8px;border-radius:10px">⏳ ${daysLeft}d left · ${m.due_date}</span>`;
    } else {
      dueBadge = `<span style="font-size:11px;color:var(--muted)">📅 ${m.due_date} · ${daysLeft}d left</span>`;
    }

    html += `
      <div style="background:var(--surface);border:1px solid ${borderCol};border-radius:14px;overflow:hidden">
        <div style="padding:14px 18px;background:var(--surface2);display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <a href="${m.web_url||'#'}" target="_blank" style="font-size:14px;font-weight:600;color:var(--text);text-decoration:none;flex:1" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text)'">${esc(m.title)}</a>
          ${dueBadge}
          <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">${issues.length} issues · ${totalPd||0}pd</span>
        </div>
        ${issues.length ? `
        <div style="padding:10px 18px 4px">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px">
            <span>${closed} closed · ${open} open</span>
            <span style="color:${pctColor};font-family:var(--mono)">${pct}%</span>
          </div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${pctColor}"></div></div>
        </div>
        <div style="max-height:200px;overflow-y:auto">
          ${issues.map(i=>`
            <a href="${i.web_url}" target="_blank" class="issue-row" style="padding:7px 18px">
              <div class="state-dot ${i.state==='closed'?'state-closed':'state-open'}"></div>
              <span style="font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0">#${i.iid}</span>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${esc(i.title)}</span>
              ${i.isBlocked?'<span class="badge badge-blocked">Blocked</span>':''}
              ${i.estimatePd?`<span class="est-label">${i.estimatePd}pd</span>`:''}
            </a>`).join('')}
        </div>` : `<div style="padding:12px 18px;font-size:12px;color:var(--muted)">No matching issues in this milestone</div>`}
      </div>`;
  });

  html += '</div>';
  document.getElementById('panel-milestones').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showErr(msg) {
  const el = document.getElementById('setup-error');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(()=>el.style.display='none', 5000);
}

// ═══════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════
loadSaved();
</script>
</body>
</html>
