<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitLab EpicDash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Syne', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .kpi-card { background: linear-gradient(135deg, #111827, #1F2937); border: 1px solid #374151; transition: all 0.2s ease; }
    .kpi-card:hover { border-color: #FC6D26; transform: translateY(-2px); }
    .filter-item { transition: all 0.15s ease; cursor: pointer; }
    .filter-item:hover { background: rgba(252,109,38,0.08); }
    .filter-item.active { background: rgba(252,109,38,0.2); border-color: #FC6D26; }
    .tab-btn.active { border-bottom: 3px solid #FC6D26; color: #FC6D26; font-weight: 600; }
    details summary { list-style: none; cursor: pointer; }
    .gl-btn { background: linear-gradient(135deg, #FC6D26, #E05C1F); }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .mr-badge { background: #1F75CB; color: white; font-size: 10px; padding: 1px 6px; border-radius: 9999px; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

<!-- Input Screen -->
<div id="input-screen" class="min-h-screen flex items-center justify-center p-6">
  <div class="max-w-lg w-full bg-gray-900 border border-gray-800 rounded-3xl p-10">
    <h1 class="text-4xl font-black text-center mb-2">EpicDash</h1>
    <p class="text-gray-400 text-center mb-8">Group Dashboard for Product Managers</p>
    <div class="space-y-6">
      <div>
        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">Group URL</label>
        <input id="group-url" type="text" placeholder="https://gitlab.com/gitlab-org" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-white">
      </div>
      <div>
        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2">Personal Access Token</label>
        <input id="pat" type="password" placeholder="glpat-..." class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-white">
      </div>
      <button onclick="loadDashboard()" class="gl-btn w-full py-4 rounded-2xl font-bold text-lg">Load Dashboard</button>
    </div>
    <div id="input-error" class="hidden mt-4 text-red-400 text-center"></div>
  </div>
</div>

<!-- Loading -->
<div id="loading-screen" class="hidden min-h-screen flex items-center justify-center">
  <div class="text-center">
    <div class="w-20 h-20 border-8 border-orange-500 border-t-transparent rounded-full spinner mx-auto mb-6"></div>
    <p class="text-xl font-medium">Loading group data...</p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard-screen" class="hidden flex flex-col h-screen">
  <header class="bg-gray-900 border-b border-gray-800 px-8 py-5 flex justify-between items-center">
    <span class="font-black text-3xl">Epic<span class="text-orange-500">Dash</span></span>
    <div class="flex items-center gap-6">
      <span id="group-name" class="font-medium text-gray-300"></span>
      <button onclick="editInput()" class="text-sm px-5 py-2 border border-gray-700 rounded-2xl hover:bg-gray-800">Change Group</button>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-80 bg-gray-900 border-r border-gray-800 overflow-y-auto p-6 space-y-8">
      <input id="search" placeholder="Search issues..." class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-3" onkeyup="applyFilters()">

      <div>
        <p class="text-xs uppercase text-gray-500 mb-3">Labels <span id="label-count" class="text-orange-400"></span></p>
        <div id="labels-list" class="space-y-1 max-h-80 overflow-y-auto"></div>
      </div>

      <div>
        <p class="text-xs uppercase text-gray-500 mb-3">Assignees</p>
        <div id="assignees-list" class="space-y-1 max-h-72 overflow-y-auto"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <div id="kpis" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10"></div>

      <div class="flex gap-10 border-b border-gray-800 mb-8">
        <button onclick="switchTab(0)" class="tab-btn active pb-4" id="tab0">Epic Overview</button>
        <button onclick="switchTab(1)" class="tab-btn pb-4" id="tab1">Issues Tree</button>
        <button onclick="switchTab(2)" class="tab-btn pb-4" id="tab2">Assignees</button>
        <button onclick="switchTab(3)" class="tab-btn pb-4" id="tab3">Milestones</button>
      </div>

      <div id="tab-content-0" class="tab-content"><div id="epic-overview" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div></div>
      <div id="tab-content-1" class="tab-content hidden"><div id="issues-tree" class="space-y-6"></div></div>
      <div id="tab-content-2" class="tab-content hidden"><div id="assignee-detail" class="space-y-8"></div></div>
      <div id="tab-content-3" class="tab-content hidden">
        <div class="flex gap-4 mb-6 items-end">
          <div>
            <label class="text-xs text-gray-400 block mb-1">From</label>
            <input id="milestone-from" type="date" class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 text-white">
          </div>
          <div>
            <label class="text-xs text-gray-400 block mb-1">To</label>
            <input id="milestone-to" type="date" class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 text-white">
          </div>
          <button onclick="applyFilters()" class="px-6 py-2 bg-orange-500 hover:bg-orange-600 rounded-xl text-sm font-medium">Apply</button>
          <button onclick="clearMilestoneDateFilter()" class="px-6 py-2 border border-gray-700 rounded-xl text-sm">Clear</button>
        </div>
        <div id="milestones-detail" class="space-y-6"></div>
      </div>
    </main>
  </div>
</div>

<script>
// ====================== STATE ======================
let appState = {
  pat: "", host: "", groupPath: "",
  epics: [], allIssues: [], filteredIssues: [],
  activeLabels: new Set(), activeAssignees: new Set(),
  groupLabels: []
};

// ====================== ESTIMATE PARSER - Person Days ======================
function parseEstimate(issue) {
  if (issue.time_stats?.time_estimate) {
    return Math.round(issue.time_stats.time_estimate / 28800); // 8 hours = 1 pd
  }

  const text = (issue.labels || []).join(" ").toLowerCase();

  // Handle "Estimate::1 pd", "Estimate::2 pw", etc.
  const match = text.match(/estimate::?(\d+)\s*(pd|pw|day|week|days|weeks)/i);
  if (match) {
    const num = parseInt(match[1]);
    const unit = match[2].toLowerCase();
    if (unit.includes('pd') || unit.includes('day')) return num;
    if (unit.includes('pw') || unit.includes('week')) return num * 5; // 1 week = 5 pd
  }
  return 0;
}

function fmtEstimate(pd) {
  if (!pd) return "—";
  return pd + " pd";
}

// ====================== API ======================
async function gitlabFetch(url) {
  let results = [];
  let nextUrl = url;
  while (nextUrl) {
    const res = await fetch(nextUrl, { headers: { "PRIVATE-TOKEN": appState.pat } });
    if (!res.ok) throw new Error(`GitLab error ${res.status}`);
    const data = await res.json();
    if (Array.isArray(data)) results = results.concat(data);
    else return data;
    const link = res.headers.get('Link');
    nextUrl = link ? link.match(/<([^>]+)>;\s*rel="next"/)?.[1] : null;
  }
  return results;
}

// ====================== LOAD DASHBOARD ======================
async function loadDashboard() {
  const urlStr = document.getElementById("group-url").value.trim();
  appState.pat = document.getElementById("pat").value.trim();

  if (!urlStr || !appState.pat) {
    document.getElementById("input-error").textContent = "Both fields required";
    document.getElementById("input-error").classList.remove("hidden");
    return;
  }

  try {
    const u = new URL(urlStr);
    appState.host = u.origin;
    appState.groupPath = u.pathname.replace(/^\/groups\//, "").replace(/^\//, "").replace(/\/$/, "");
  } catch {
    alert("Invalid Group URL");
    return;
  }

  document.getElementById("input-screen").classList.add("hidden");
  document.getElementById("loading-screen").classList.remove("hidden");

  try {
    const base = `${appState.host}/api/v4`;
    const encoded = encodeURIComponent(appState.groupPath);

    appState.groupLabels = await gitlabFetch(`${base}/groups/${encoded}/labels?per_page=100`);

    let epics = await gitlabFetch(`${base}/groups/${encoded}/epics?state=opened&per_page=100`);

    const promises = epics.map(async (epic) => {
      const issues = await gitlabFetch(`${base}/groups/${encoded}/epics/${epic.iid}/issues?per_page=100`);
      return {
        epic,
        issues: issues.map(i => ({ ...i, estimatePd: parseEstimate(i) }))
      };
    });

    appState.epics = await Promise.all(promises);
    appState.allIssues = appState.epics.flatMap(e => e.issues);
    appState.filteredIssues = [...appState.allIssues];

    document.getElementById("loading-screen").classList.add("hidden");
    document.getElementById("dashboard-screen").classList.remove("hidden");

    document.getElementById("group-name").textContent = appState.groupPath;

    buildFilters();
    refreshDashboard();
  } catch (err) {
    alert("Failed to load: " + err.message);
    document.getElementById("loading-screen").classList.add("hidden");
    document.getElementById("input-screen").classList.remove("hidden");
  }
}

// ====================== FILTERS ======================
function buildFilters() {
  const usage = new Map();
  appState.allIssues.forEach(issue => {
    (issue.labels || []).forEach(l => {
      usage.set(l.name, (usage.get(l.name) || 0) + 1);
    });
  });

  const usedLabels = appState.groupLabels.filter(l => usage.has(l.name));

  const sortedLabels = usedLabels.sort((a, b) => (usage.get(b.name) || 0) - (usage.get(a.name) || 0));

  let html = "";
  sortedLabels.forEach(l => {
    const count = usage.get(l.name) || 0;
    html += `<div data-label="${l.name}" onclick="toggleLabel(this)" class="filter-item px-4 py-3 rounded-2xl border border-transparent flex items-center gap-3 text-sm">
      <span class="w-4 h-4 rounded flex-shrink-0" style="background:${l.color || '#666'}"></span>
      ${l.name} <span class="text-xs text-gray-500 ml-auto">(${count})</span>
    </div>`;
  });

  document.getElementById("labels-list").innerHTML = html || "<p class='text-gray-500 text-sm'>No used labels found</p>";
  document.getElementById("label-count").textContent = `(${sortedLabels.length})`;

  // Assignees
  const assigneeMap = new Map();
  appState.allIssues.forEach(issue => (issue.assignees || []).forEach(a => assigneeMap.set(a.id, a)));
  let ahtml = "";
  assigneeMap.forEach(a => {
    ahtml += `<div data-assignee="${a.id}" onclick="toggleAssignee(this)" class="filter-item px-4 py-3 rounded-2xl border border-transparent flex items-center gap-3 text-sm">
      ${a.avatar_url ? `<img src="${a.avatar_url}" class="w-6 h-6 rounded-full">` : ''}
      ${a.name || a.username}
    </div>`;
  });
  document.getElementById("assignees-list").innerHTML = ahtml || "<p class='text-gray-500 text-sm'>No assignees</p>";
}

function toggleLabel(el) {
  const name = el.dataset.label;
  appState.activeLabels.has(name) ? appState.activeLabels.delete(name) : appState.activeLabels.add(name);
  el.classList.toggle("active");
  applyFilters();
}

function toggleAssignee(el) {
  const id = parseInt(el.dataset.assignee);
  appState.activeAssignees.has(id) ? appState.activeAssignees.delete(id) : appState.activeAssignees.add(id);
  el.classList.toggle("active");
  applyFilters();
}

async function applyFilters() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999;';
  overlay.innerHTML = `<div class="text-center"><div class="w-12 h-12 border-4 border-orange-500 border-t-transparent rounded-full spinner mx-auto mb-3"></div><p class="text-white">Applying filters...</p></div>`;
  document.body.appendChild(overlay);

  const term = document.getElementById("search").value.toLowerCase().trim();

  appState.filteredIssues = appState.allIssues.filter(issue => {
    if (term && !issue.title.toLowerCase().includes(term)) return false;
    if (appState.activeLabels.size > 0) {
      const issueLabels = new Set((issue.labels || []).map(l => l.name));
      if (!Array.from(appState.activeLabels).every(l => issueLabels.has(l))) return false;
    }
    if (appState.activeAssignees.size > 0) {
      const ids = new Set((issue.assignees || []).map(a => a.id));
      if (!Array.from(appState.activeAssignees).some(id => ids.has(id))) return false;
    }
    return true;
  });

  refreshDashboard();
  setTimeout(() => overlay.remove(), 300);
}

function refreshDashboard() {
  updateKPIs();
  renderEpicOverview();
  renderIssuesTree();
  renderAssigneeOverview();
  renderMilestones();
}

// ====================== KPIs ======================
function updateKPIs() {
  const issues = appState.filteredIssues;
  const total = issues.length;
  const open = issues.filter(i => i.state === "opened").length;
  const totalPd = issues.reduce((s, i) => s + (i.estimatePd || 0), 0);

  document.getElementById("kpis").innerHTML = `
    <div class="kpi-card rounded-3xl p-6"><p class="text-xs text-gray-400">Total</p><p class="text-4xl font-bold mono">${total}</p></div>
    <div class="kpi-card rounded-3xl p-6"><p class="text-xs text-green-400">Open</p><p class="text-4xl font-bold mono text-green-400">${open}</p></div>
    <div class="kpi-card rounded-3xl p-6"><p class="text-xs text-blue-400">Estimated</p><p class="text-4xl font-bold mono text-blue-400">${totalPd} pd</p></div>
  `;
}

// ====================== RENDER ======================
function renderEpicOverview() {
  let html = "";
  appState.epics.forEach(({epic, issues}) => {
    const filtered = issues.filter(i => appState.filteredIssues.some(f => f.id === i.id));
    const totalPd = filtered.reduce((s, i) => s + (i.estimatePd || 0), 0);
    html += `
      <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6">
        <a href="${epic.web_url}" target="_blank" class="font-bold text-lg hover:text-orange-400 block">${epic.title}</a>
        <p class="text-xs text-gray-500 mt-1">#${epic.iid} • ${filtered.length} issues</p>
        <div class="mt-6 text-blue-400 font-medium">${totalPd} pd estimated</div>
      </div>`;
  });
  document.getElementById("epic-overview").innerHTML = html || "<p class='text-gray-400 p-8'>No open epics</p>";
}

function renderIssuesTree() {
  let html = "";
  appState.epics.forEach(({epic, issues}) => {
    const filtered = issues.filter(i => appState.filteredIssues.some(f => f.id === i.id));
    if (filtered.length === 0) return;
    html += `<div class="bg-gray-900 border border-gray-800 rounded-3xl overflow-hidden">
      <details open>
        <summary class="px-6 py-5 bg-gray-800 font-semibold cursor-pointer">#${epic.iid} ${epic.title} <span class="ml-3 text-xs bg-gray-700 px-3 py-1 rounded-full">${filtered.length}</span></summary>
        <div class="divide-y divide-gray-800">`;
    filtered.forEach(issue => {
      const hasMR = (issue.merge_requests_count || 0) > 0;
      html += `
        <a href="${issue.web_url}" target="_blank" class="block px-6 py-4 hover:bg-gray-800 flex justify-between items-center">
          <span>#${issue.iid} ${issue.title}</span>
          <div class="flex items-center gap-3">
            ${hasMR ? '<span class="mr-badge">MR</span>' : ''}
            <span class="text-blue-400">${fmtEstimate(issue.estimatePd)}</span>
          </div>
        </a>`;
    });
    html += `</div></details></div>`;
  });
  document.getElementById("issues-tree").innerHTML = html || "<p class='text-gray-400 p-12 text-center'>No matching issues</p>";
}

function renderAssigneeOverview() {
  const map = new Map();
  appState.filteredIssues.forEach(issue => {
    (issue.assignees || []).forEach(a => {
      if (!map.has(a.id)) map.set(a.id, {user: a, issues: []});
      map.get(a.id).issues.push(issue);
    });
  });

  let html = "";
  map.forEach(({user, issues}) => {
    html += `
      <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6">
        <div class="flex items-center gap-4 mb-4">
          ${user.avatar_url ? `<img src="${user.avatar_url}" class="w-10 h-10 rounded-full">` : ''}
          <div class="font-medium">${user.name || user.username}</div>
        </div>
        <div class="space-y-2 text-sm">`;
    issues.forEach(i => {
      html += `<a href="${i.web_url}" target="_blank" class="block hover:text-orange-400">#${i.iid} ${i.title}</a>`;
    });
    html += `</div></div>`;
  });
  document.getElementById("assignee-detail").innerHTML = html || "<p class='text-gray-400 p-8'>No assignees in filter</p>";
}

function renderMilestones() {
  const groups = new Map();
  const threeMonthsAgo = new Date();
  threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);

  appState.filteredIssues.forEach(issue => {
    if (!issue.milestone) return;
    if (issue.milestone.state === 'closed') return;
    if (issue.milestone.due_date && new Date(issue.milestone.due_date) < threeMonthsAgo) return;

    const key = issue.milestone.id;
    if (!groups.has(key)) groups.set(key, {milestone: issue.milestone, issues: []});
    groups.get(key).issues.push(issue);
  });

  const fromDate = document.getElementById("milestone-from").value ? new Date(document.getElementById("milestone-from").value) : null;
  const toDate = document.getElementById("milestone-to").value ? new Date(document.getElementById("milestone-to").value) : null;

  let filtered = Array.from(groups.values());
  if (fromDate || toDate) {
    filtered = filtered.filter(({milestone}) => {
      if (!milestone.due_date) return false;
      const due = new Date(milestone.due_date);
      if (fromDate && due < fromDate) return false;
      if (toDate && due > toDate) return false;
      return true;
    });
  }

  filtered.sort((a, b) => new Date(a.milestone.due_date || '9999-12-31') - new Date(b.milestone.due_date || '9999-12-31'));

  let html = "";
  filtered.forEach(({milestone, issues}) => {
    const due = milestone.due_date || "No due date";
    html += `
      <div class="bg-gray-900 border border-gray-800 rounded-3xl p-6">
        <a href="${milestone.web_url}" target="_blank" class="font-semibold hover:text-orange-400 block">${milestone.title}</a>
        <p class="text-xs text-gray-400">Due: ${due}</p>
        <details class="mt-4">
          <summary class="cursor-pointer text-sm text-gray-400 hover:text-white">View ${issues.length} issues</summary>
          <div class="mt-3 space-y-2 text-sm max-h-60 overflow-auto">
            ${issues.map(i => `<a href="${i.web_url}" target="_blank" class="block hover:text-orange-400">#${i.iid} ${i.title}</a>`).join('')}
          </div>
        </details>
      </div>`;
  });

  document.getElementById("milestones-detail").innerHTML = html || "<p class='text-gray-400 p-8'>No active milestones in date range</p>";
}

function applyMilestoneDateFilter() { renderMilestones(); }
function clearMilestoneDateFilter() {
  document.getElementById("milestone-from").value = "";
  document.getElementById("milestone-to").value = "";
  renderMilestones();
}

function switchTab(n) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.getElementById(`tab-content-${n}`).classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === n));
}

function editInput() { location.reload(); }
</script>
</body>
</html>
